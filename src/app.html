<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="utf-8" />
        <!-- Root-absolute paths: favicons live at the domain root and must resolve the same on every route
             (relative %sveltekit.assets% resolves against the current page → 404 on nested routes like /jobs/[id]). -->
        <link rel="icon" href="/favicon.ico" sizes="any" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="robots" content="noindex, nofollow" />
        <meta name="theme-color" content="#000000" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
            rel="stylesheet"
        />
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover" class="bg-background text-foreground min-h-dvh font-sans antialiased">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
